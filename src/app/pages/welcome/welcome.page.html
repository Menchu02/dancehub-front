<ion-content class="welcome-content" [fullscreen]="true">
  <div class="welcome-background"></div>
  <div class="welcome-overlay"></div>

  <div class="welcome-layout">
    <header class="welcome-brand">
      <div class="welcome-brand-icon" aria-hidden="true">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="24" fill="rgba(168, 85, 247, 0.25)"/>
          <path d="M18 30c2-6 4-9 6-9s4 3 6 9" stroke="#c084fc" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="20" cy="16" r="2.5" fill="#c084fc"/>
          <circle cx="28" cy="16" r="2.5" fill="#c084fc"/>
          <path d="M16 34h16" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="welcome-brand-text">
        <h1 class="welcome-title">DanceHub</h1>
        <p class="welcome-tagline">Tu comunidad del baile</p>
      </div>
    </header>

    <section class="welcome-hero">
      <h2 class="welcome-headline">
        Encuentra tu
        <span class="welcome-headline-accent">próximo evento de baile</span>
      </h2>
      <p class="welcome-description">Sociales, talleres y escuelas cerca de ti.</p>
    </section>

    <div class="welcome-actions">
      <ion-button class="welcome-btn-primary" expand="block" shape="round" (click)="goToLogin()">
        Iniciar sesión
      </ion-button>
      <ion-button class="welcome-btn-secondary" expand="block" shape="round" fill="outline" (click)="goToRegister()">
        Crear cuenta
      </ion-button>
    </div>

  
  </div>
</ion-content>
